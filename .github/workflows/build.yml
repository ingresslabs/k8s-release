name: Build Kubernetes Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      kube_version:
        description: 'Kubernetes version to build'
        required: false
        default: 'v1.32.2'
      etcd_version:
        description: 'etcd version to build'
        required: false
        default: 'v3.5.9'
      flannel_version:
        description: 'Flannel version to build'
        required: false
        default: 'v0.26.4'
      calico_version:
        description: 'Calico version to build'
        required: false
        default: 'v3.28.0'
      package_type:
        description: 'Package type (deb, rpm, or all)'
        required: false
        default: 'deb'
        type: choice
        options:
          - deb
          - rpm
          - all

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify pinned Docker inputs
        run: make check-pinned-inputs

  build:
    needs: validate-inputs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - kube-proxy
          - kubelet
          - etcd
          - kube-scheduler
          - kube-controller-manager
          - kube-apiserver
          - kubectl
          - flannel
          - calico
          - certificates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install package verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build ${{ matrix.component }}
        run: |
          KUBE_VERSION=${{ github.event.inputs.kube_version || 'v1.32.2' }} \
          ETCD_VERSION=${{ github.event.inputs.etcd_version || 'v3.5.9' }} \
          FLANNEL_VERSION=${{ github.event.inputs.flannel_version || 'v0.26.4' }} \
          CALICO_VERSION=${{ github.event.inputs.calico_version || 'v3.28.0' }} \
          PACKAGE_TYPE=${{ github.event.inputs.package_type || 'deb' }} \
          DOCKER_COMPOSE="docker compose" \
          make build-${{ matrix.component }}

      - name: Verify generated packages
        run: ./scripts/verify-packages.sh output

      - name: Generate checksums and manifest
        run: ./scripts/generate-release-metadata.sh output "${{ matrix.component }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: output
          format: spdx-json
          output-file: output/${{ matrix.component }}.spdx.json
          upload-artifact: false

      - name: Prepare attestation subjects
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p attestation-subjects
          find output -maxdepth 1 -type f \( -name "*.deb" -o -name "*.rpm" \) -exec cp {} attestation-subjects/ \;

      - name: Attest package provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: attestation-subjects/*

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign packages with keyless Sigstore
        if: github.event_name != 'pull_request'
        run: |
          for pkg in output/*.deb output/*.rpm; do
            [ -f "$pkg" ] || continue
            cosign sign-blob --yes --bundle "${pkg}.sigstore.json" "$pkg"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-packages
          path: output/
          retention-days: 7

  collect-artifacts:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          find all-artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.spdx.json" -o -name "*.sigstore.json" -o -name "*-SHA256SUMS" -o -name "*-release-manifest.json" \) | xargs -I{} cp {} release-artifacts/
          find release-artifacts -type f \( -name "*.deb" -o -name "*.rpm" \) -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-packages
          path: release-artifacts/
          retention-days: 7
          
      - name: Set up package repositories
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p debian/main rpm
          
          # Copy DEB packages to debian repo structure
          cp release-artifacts/*.deb debian/main/ || true
          
          # Copy RPM packages to rpm repo structure
          cp release-artifacts/*.rpm rpm/ || true
          
      - name: Create Debian repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.inputs.package_type == 'deb' || github.event.inputs.package_type == 'all' || github.event.inputs.package_type == null)
        run: |
          cd debian
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          dpkg-scanpackages main /dev/null > main/Packages
          test -s main/Packages
          cat main/Packages
          gzip -k main/Packages
          
      - name: Create RPM repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.inputs.package_type == 'rpm' || github.event.inputs.package_type == 'all')
        run: |
          cd rpm
          sudo apt-get update
          sudo apt-get install -y createrepo-c
          createrepo .
          test -f repodata/repomd.xml
          
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ORAS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: oras-project/setup-oras@v1
          
      - name: Publish package repository bundle to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p package-repositories
          cp -r debian/ rpm/ package-repositories/
          (
            cd package-repositories
            find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )
          tar -czf kubernetes-package-repositories.tar.gz -C package-repositories .
          version="${{ github.event.inputs.kube_version || 'v1.32.2' }}"
          version="${version#v}"
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          oras push "ghcr.io/${repo}/kubernetes-packages:${version}" \
            --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            kubernetes-package-repositories.tar.gz:application/vnd.kubekattle.k8s-release.repositories.v1.tar+gzip \
            package-repositories/SHA256SUMS:text/plain
          
      - name: Upload package repositories as artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: package-repositories
          path: package-repositories/
          retention-days: 30
