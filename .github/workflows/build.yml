name: Build Kubernetes Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      kube_version:
        description: 'Kubernetes version to build'
        required: false
        default: 'v1.32.2'
      etcd_version:
        description: 'etcd version to build'
        required: false
        default: 'v3.5.9'
      flannel_version:
        description: 'Flannel version to build'
        required: false
        default: 'v0.26.4'
      calico_version:
        description: 'Calico version to build'
        required: false
        default: 'v3.28.0'
      package_type:
        description: 'Package type (deb, rpm, or all)'
        required: false
        default: 'deb'
        type: choice
        options:
          - deb
          - rpm
          - all
      version_matrix:
        description: 'Optional JSON array of version sets'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify pinned Docker inputs
        run: make check-pinned-inputs

  resolve-version-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version matrix
        id: resolve
        env:
          VERSION_MATRIX: ${{ github.event.inputs.version_matrix }}
          KUBE_VERSION: ${{ github.event.inputs.kube_version || 'v1.32.2' }}
          ETCD_VERSION: ${{ github.event.inputs.etcd_version || 'v3.5.9' }}
          FLANNEL_VERSION: ${{ github.event.inputs.flannel_version || 'v0.26.4' }}
          CALICO_VERSION: ${{ github.event.inputs.calico_version || 'v3.28.0' }}
        run: |
          matrix=$(./scripts/resolve-version-matrix.sh)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "${matrix}" | jq .

  build:
    needs:
      - validate-inputs
      - resolve-version-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version_set: ${{ fromJson(needs.resolve-version-matrix.outputs.matrix) }}
        component:
          - kube-proxy
          - kubelet
          - etcd
          - kube-scheduler
          - kube-controller-manager
          - kube-apiserver
          - kubectl
          - flannel
          - calico
          - certificates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install package verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build ${{ matrix.component }}
        run: |
          KUBE_VERSION=${{ matrix.version_set.kube_version }} \
          ETCD_VERSION=${{ matrix.version_set.etcd_version }} \
          FLANNEL_VERSION=${{ matrix.version_set.flannel_version }} \
          CALICO_VERSION=${{ matrix.version_set.calico_version }} \
          PACKAGE_TYPE=${{ github.event.inputs.package_type || 'deb' }} \
          DOCKER_COMPOSE="docker compose" \
          make build-${{ matrix.component }}

      - name: Verify generated packages
        run: ./scripts/verify-packages.sh output

      - name: Install smoke test generated packages
        env:
          SMOKE_REPORT: output/${{ matrix.version_set.label }}-${{ matrix.component }}-install-smoke.txt
        run: ./scripts/smoke-install-packages.sh output

      - name: Generate checksums and manifest
        run: ./scripts/generate-release-metadata.sh output "${{ matrix.version_set.label }}-${{ matrix.component }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: output
          format: spdx-json
          output-file: output/${{ matrix.version_set.label }}-${{ matrix.component }}.spdx.json
          upload-artifact: false

      - name: Prepare attestation subjects
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p attestation-subjects
          find output -maxdepth 1 -type f \( -name "*.deb" -o -name "*.rpm" \) -exec cp {} attestation-subjects/ \;

      - name: Attest package provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: attestation-subjects/*

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign packages with keyless Sigstore
        if: github.event_name != 'pull_request'
        run: |
          for pkg in output/*.deb output/*.rpm; do
            [ -f "$pkg" ] || continue
            cosign sign-blob --yes --bundle "${pkg}.sigstore.json" "$pkg"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version_set.label }}-${{ matrix.component }}-packages
          path: output/
          retention-days: 7

  reproducible-build:
    needs:
      - validate-inputs
      - resolve-version-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run_id:
          - first
          - second
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install package verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build kubectl reproducibility sample
        run: |
          KUBE_VERSION=${{ fromJson(needs.resolve-version-matrix.outputs.matrix)[0].kube_version }} \
          PACKAGE_TYPE=${{ github.event.inputs.package_type || 'deb' }} \
          DOCKER_COMPOSE="docker compose" \
          make build-kubectl

      - name: Verify generated packages
        run: ./scripts/verify-packages.sh output

      - name: Upload reproducibility sample
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-${{ matrix.run_id }}
          path: |
            output/*.deb
            output/*.rpm
          retention-days: 7

  compare-reproducibility:
    needs: reproducible-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download reproducibility samples
        uses: actions/download-artifact@v4
        with:
          pattern: reproducibility-*
          path: reproducibility-artifacts

      - name: Compare package checksums
        run: ./scripts/compare-reproducible-artifacts.sh reproducibility-artifacts/reproducibility-first reproducibility-artifacts/reproducibility-second

  collect-artifacts:
    needs:
      - build
      - compare-reproducibility
      - resolve-version-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c dpkg-dev gnupg

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          find all-artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.spdx.json" -o -name "*.sigstore.json" -o -name "*-SHA256SUMS" -o -name "*-release-manifest.json" -o -name "*-install-smoke.txt" \) | xargs -I{} cp {} release-artifacts/
          find release-artifacts -type f \( -name "*.deb" -o -name "*.rpm" \) -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS

      - name: Create signed package repositories
        env:
          REPO_GPG_PRIVATE_KEY: ${{ secrets.REPO_GPG_PRIVATE_KEY }}
          REPO_GPG_PASSPHRASE: ${{ secrets.REPO_GPG_PASSPHRASE }}
        run: ./scripts/create-package-repositories.sh release-artifacts package-repositories

      - name: Generate release evidence
        env:
          KUBE_VERSION: ${{ fromJson(needs.resolve-version-matrix.outputs.matrix)[0].kube_version }}
          ETCD_VERSION: ${{ fromJson(needs.resolve-version-matrix.outputs.matrix)[0].etcd_version }}
          FLANNEL_VERSION: ${{ fromJson(needs.resolve-version-matrix.outputs.matrix)[0].flannel_version }}
          CALICO_VERSION: ${{ fromJson(needs.resolve-version-matrix.outputs.matrix)[0].calico_version }}
        run: |
          ./scripts/generate-release-evidence.sh release-artifacts package-repositories release-artifacts/release-evidence.md
          cp package-repositories/repo-signing-key.asc release-artifacts/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-packages
          path: release-artifacts/
          retention-days: 7

      - name: Upload package repositories as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-repositories
          path: package-repositories/
          retention-days: 30
          
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ORAS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: oras-project/setup-oras@v1
          
      - name: Publish package repository bundle to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          (
            cd package-repositories
            find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )
          tar -czf kubernetes-package-repositories.tar.gz -C package-repositories .
          version="${{ fromJson(needs.resolve-version-matrix.outputs.matrix)[0].kube_version }}"
          version="${version#v}"
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          oras push "ghcr.io/${repo}/kubernetes-packages:${version}" \
            --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            kubernetes-package-repositories.tar.gz:application/vnd.kubekattle.k8s-release.repositories.v1.tar+gzip \
            package-repositories/SHA256SUMS:text/plain
