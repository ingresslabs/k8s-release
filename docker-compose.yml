        GO_IMAGE: "${ISTIO_GO_IMAGE:-golang:1.25.9-bookworm@sha256:298734aec230b5f3e8cee450ce6d7eccc39f1797ba548ee90d57e9803030c6c3}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/istioctl /output/istioctl && /usr/local/bin/package-builder.sh istioctl \"$${ISTIO_VERSION}\" \"Istio Command Line Utility\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
