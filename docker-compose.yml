x-package-environment: &package-environment
  PACKAGE_TYPE: "${PACKAGE_TYPE:-deb}"
  SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
  PKG_MAINTAINER: "${PKG_MAINTAINER:-Kubernetes Packager <maintainer@example.com>}"
  PKG_LICENSE: "${PKG_LICENSE:-Apache-2.0}"
  PKG_URL: "${PKG_URL:-https://kubernetes.io}"
  PKG_ARCH: "${PKG_ARCH:-amd64}"

services:
  certificates-builder:
    build:
      context: .
      dockerfile: Dockerfile.certificates
      args:
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment:
      <<: *package-environment
      CERT_VERSION: "${CERT_VERSION:-1.0.0}"
    volumes:
      - ./output:/output

  kube-proxy-builder:
    build:
      context: .
      dockerfile: Dockerfile.kube-proxy
      args:
        KUBE_GIT_URL: "${KUBE_GIT_URL:-https://github.com/kubernetes/kubernetes.git}"
        KUBE_VERSION: "${KUBE_VERSION:-v1.36.1}"
        GO_IMAGE: "${KUBE_GO_IMAGE:-golang:1.26.2-bookworm@sha256:47ce5636e9936b2c5cbf708925578ef386b4f8872aec74a67bd13a627d242b19}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/kube-proxy /output/kube-proxy && /usr/local/bin/package-builder.sh kube-proxy \"$${KUBE_VERSION}\" \"Kubernetes Network Proxy\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
    volumes:
      - ./output:/output

  kubelet-builder:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
      args:
        KUBE_GIT_URL: "${KUBE_GIT_URL:-https://github.com/kubernetes/kubernetes.git}"
        KUBE_VERSION: "${KUBE_VERSION:-v1.36.1}"
        GO_IMAGE: "${KUBE_GO_IMAGE:-golang:1.26.2-bookworm@sha256:47ce5636e9936b2c5cbf708925578ef386b4f8872aec74a67bd13a627d242b19}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/kubelet /output/kubelet && /usr/local/bin/package-builder.sh kubelet \"$${KUBE_VERSION}\" \"Kubernetes Node Agent\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
    volumes:
      - ./output:/output

  etcd-builder:
    build:
      context: .
      dockerfile: Dockerfile.etcd
      args:
        ETCD_VERSION: "${ETCD_VERSION:-v3.6.11}"
        GO_IMAGE: "${ETCD_GO_IMAGE:-golang:1.25.9-bookworm@sha256:298734aec230b5f3e8cee450ce6d7eccc39f1797ba548ee90d57e9803030c6c3}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/etcd /output/etcd && cp /usr/local/bin/etcdctl /output/etcdctl && /usr/local/bin/package-builder.sh etcd \"$${ETCD_VERSION}\" \"etcd distributed key-value store\" && /usr/local/bin/package-builder.sh etcdctl \"$${ETCD_VERSION}\" \"etcd command line client\" && ls -la /output/"]
    volumes:
      - ./output:/output

  kube-scheduler-builder:
    build:
      context: .
      dockerfile: Dockerfile.kube-scheduler
      args:
        KUBE_GIT_URL: "${KUBE_GIT_URL:-https://github.com/kubernetes/kubernetes.git}"
        KUBE_VERSION: "${KUBE_VERSION:-v1.36.1}"
        GO_IMAGE: "${KUBE_GO_IMAGE:-golang:1.26.2-bookworm@sha256:47ce5636e9936b2c5cbf708925578ef386b4f8872aec74a67bd13a627d242b19}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/kube-scheduler /output/kube-scheduler && /usr/local/bin/package-builder.sh kube-scheduler \"$${KUBE_VERSION}\" \"Kubernetes Scheduler\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
    volumes:
      - ./output:/output

  kube-controller-manager-builder:
    build:
      context: .
      dockerfile: Dockerfile.kube-controller-manager
      args:
        KUBE_GIT_URL: "${KUBE_GIT_URL:-https://github.com/kubernetes/kubernetes.git}"
        KUBE_VERSION: "${KUBE_VERSION:-v1.36.1}"
        GO_IMAGE: "${KUBE_GO_IMAGE:-golang:1.26.2-bookworm@sha256:47ce5636e9936b2c5cbf708925578ef386b4f8872aec74a67bd13a627d242b19}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/kube-controller-manager /output/kube-controller-manager && /usr/local/bin/package-builder.sh kube-controller-manager \"$${KUBE_VERSION}\" \"Kubernetes Controller Manager\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
    volumes:
      - ./output:/output

  kube-apiserver-builder:
    build:
      context: .
      dockerfile: Dockerfile.kube-apiserver
      args:
        KUBE_GIT_URL: "${KUBE_GIT_URL:-https://github.com/kubernetes/kubernetes.git}"
        KUBE_VERSION: "${KUBE_VERSION:-v1.36.1}"
        GO_IMAGE: "${KUBE_GO_IMAGE:-golang:1.26.2-bookworm@sha256:47ce5636e9936b2c5cbf708925578ef386b4f8872aec74a67bd13a627d242b19}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/kube-apiserver /output/kube-apiserver && /usr/local/bin/package-builder.sh kube-apiserver \"$${KUBE_VERSION}\" \"Kubernetes API Server\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
    volumes:
      - ./output:/output

  kubectl-builder:
    build:
      context: .
      dockerfile: Dockerfile.kubectl
      args:
        KUBE_GIT_URL: "${KUBE_GIT_URL:-https://github.com/kubernetes/kubernetes.git}"
        KUBE_VERSION: "${KUBE_VERSION:-v1.36.1}"
        GO_IMAGE: "${KUBE_GO_IMAGE:-golang:1.26.2-bookworm@sha256:47ce5636e9936b2c5cbf708925578ef386b4f8872aec74a67bd13a627d242b19}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/kubectl /output/kubectl && /usr/local/bin/package-builder.sh kubectl \"$${KUBE_VERSION}\" \"Kubernetes Command Line Tool\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
    volumes:
      - ./output:/output

  flannel-builder:
    build:
      context: .
      dockerfile: Dockerfile.flannel
      args:
        FLANNEL_VERSION: "${FLANNEL_VERSION:-v0.28.4}"
        FLANNEL_GIT_URL: "${FLANNEL_GIT_URL:-https://github.com/flannel-io/flannel.git}"
        GO_IMAGE: "${FLANNEL_GO_IMAGE:-golang:1.25.9-bookworm@sha256:298734aec230b5f3e8cee450ce6d7eccc39f1797ba548ee90d57e9803030c6c3}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim@sha256:f9c6a2fd2ddbc23e336b6257a5245e31f996953ef06cd13a59fa0a1df2d5c252}"
        DEBIAN_SNAPSHOT: "${DEBIAN_SNAPSHOT:-20260401T000000Z}"
        SOURCE_DATE_EPOCH: "${SOURCE_DATE_EPOCH:-0}"
    environment: *package-environment
    entrypoint: ["sh", "-c", "cp /usr/local/bin/flanneld /output/flanneld && /usr/local/bin/package-builder.sh flanneld \"$${FLANNEL_VERSION}\" \"Flannel Network Fabric for Containers\" && find / -type f \\( -name '*.deb' -o -name '*.rpm' \\) -exec cp {} /output/ \\; && ls -la /output/"]
